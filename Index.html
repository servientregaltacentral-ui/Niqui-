<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Central de Cobros</title>
  <style>
    body { font-family: Arial; background: #f4f6f9; padding: 30px; }
    .panel { max-width: 420px; margin: auto; background: white; padding: 25px; border-radius: 10px; box-shadow: 0 0 10px rgba(0,0,0,0.1); }
    h2 { text-align: center; }
    input { width: 100%; padding: 12px; margin: 8px 0; border: 1px solid #ddd; border-radius: 6px; }
    button { width: 100%; padding: 14px; background: #ff6a00; border: none; color: white; font-size: 16px; border-radius: 6px; cursor: pointer; margin-top: 10px; }
    .resultado { margin-top: 20px; padding: 15px; background: #f1f1f1; border-radius: 6px; }
    .link { word-break: break-all; font-size: 14px; }
  </style>
  <script src="https:                                                                 
  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/9.6.1/firebase-app.js";
    import { getDatabase, ref, set } from "https:                                                         

    const firebaseConfig = {
      apiKey: "TU_API_KEY",
      authDomain: "TU_AUTH_DOMAIN",
      databaseURL: "TU_DATABASE_URL",
      projectId: "TU_PROJECT_ID",
      storageBucket: "TU_STORAGE_BUCKET",
      messagingSenderId: "TU_MESSAGING_SENDER_ID",
      appId: "TU_APP_ID"
    };
    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);
  </script>
</head>
<body>
  <div class="panel">
    <h2>Generar Cobro</h2>
    <input id="cliente" placeholder="Nombre cliente">
    <input id="producto" placeholder="Producto">
    <input id="precio" placeholder="Precio">
    <input id="telefono" placeholder="WhatsApp cliente">
    <button onclick="crearPedido()">Generar Link de Pago</button>
    <div id="resultado" class="resultado" style="display:none"></div>
  </div>

  <script>
    function crearPedido() {
      let cliente = document.getElementById("cliente").value;
      let producto = document.getElementById("producto").value;
      let precio = document.getElementById("precio").value;
      let telefono = document.getElementById("telefono").value;
      let pedido = Math.floor(Math.random() * 900000 + 100000);
      let link = window.location.href + "pago/" + pedido;
      let mensaje = "Hola " + cliente + "%0A%0A" + "Tu pedido está listo:%0A" + "Producto: " + producto + "%0A" + "Valor: $" + precio + "%0A%0A" + "Paga aquí:%0A" + link;
      let whatsapp = "https://wa.me/57" + telefono + "?text=" + mensaje;
      let html = `
        <b>ID Pedido:</b> ${pedido}<br><br>
        <b>Link de pago:</b><br>
        <div class="link">${link}</div><br>
        <div id="qrcode"></div><br>
        <a href="${whatsapp}" target="_blank">
          <button>Enviar por WhatsApp</button>
        </a>
        <br><br>
        <input id="otp" placeholder="Código OTP">
        <button onclick="validarOTP(${pedido})">Autorizar Pago</button>
      `;
      document.getElementById("resultado").style.display = "block";
      document.getElementById("resultado").innerHTML = html;
      new QRCode(document.getElementById("qrcode"), link);

      // Guardar en Firebase
      set(ref(db, 'pedidos/' + pedido), {
        cliente, producto, precio, estado: 'PENDIENTE'
      });
    }

    function validarOTP(pedido) {
      let otp = document.getElementById("otp").value;
      if (otp === "123456") { // Simulación OTP
        set(ref(db, 'pedidos/' + pedido + '/estado'), 'PAGADO');
        alert("Pago autorizado");
      } else {
        alert("OTP inválido");
      }
    }
  </script>
</body>
</html>
