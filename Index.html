<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Central de Cobros</title>

<style>

body{
font-family: Arial;
background:#f2f4f8;
padding:30px;
}

.container{
max-width:500px;
margin:auto;
background:white;
padding:25px;
border-radius:10px;
box-shadow:0 5px 20px rgba(0,0,0,0.1);
}

h1{
text-align:center;
}

input{
width:100%;
padding:12px;
margin-top:10px;
border-radius:6px;
border:1px solid #ccc;
}

button{
width:100%;
padding:14px;
margin-top:15px;
background:#007bff;
color:white;
border:none;
border-radius:6px;
font-size:16px;
cursor:pointer;
}

button:hover{
background:#0056b3;
}

#resultado{
margin-top:20px;
padding:15px;
background:#e9f3ff;
border-radius:6px;
display:none;
}

</style>

</head>

<body>

<div class="container">

<h1>Central de Cobros</h1>

<input id="cliente" placeholder="Nombre del cliente">

<input id="telefono" placeholder="Teléfono">

<input id="valor" placeholder="Valor del cobro">

<button onclick="generarCobro()">Generar Cobro</button>

<div id="resultado"></div>

</div>


<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-app.js";
import { getDatabase, ref, push } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-database.js";

const firebaseConfig = {

apiKey: "AIzaSyDGqJeIuTqMQ6EuBRS4oTA5oKYdZUOj1IU",
authDomain: "deposito-asegurado-guia.firebaseapp.com",
projectId: "deposito-asegurado-guia",
storageBucket: "deposito-asegurado-guia.firebasestorage.app",
messagingSenderId: "747606323990",
appId: "1:747606323990:web:e39f2ff3e4d50345391637"

};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

window.generarCobro = function(){

let cliente = document.getElementById("cliente").value
let telefono = document.getElementById("telefono").value
let valor = document.getElementById("valor").value

let codigo = Math.floor(100000 + Math.random() * 900000)

push(ref(db,"cobros"),{

cliente:cliente,
telefono:telefono,
valor:valor,
codigo:codigo,
fecha:Date.now()

})

document.getElementById("resultado").style.display="block"
document.getElementById("resultado").innerHTML=`

<b>Cobro generado</b><br><br>

Cliente: ${cliente}<br>
Teléfono: ${telefono}<br>
Valor: $${valor}<br>
Código: <b>${codigo}</b>

`

}

</script>

</body>
</html>
